version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      # Mount Docker socket so the orchestrator can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist the sqlite database
      - issue_hunter_data:/app/backend

volumes:
  issue_hunter_data:
